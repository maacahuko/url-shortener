upstream flask_backend {
    server backend:5000;
}

server {
    listen 80;
    server_name _;

    # ── Security headers ───────────────────────────
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "DENY"            always;
    add_header X-XSS-Protection        "1; mode=block"   always;
    add_header Referrer-Policy         "no-referrer"     always;

    # ── Static frontend ────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(css|js|ico|png|jpg|svg|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── API: shorten endpoint ──────────────────────
    location /shorten {
        proxy_pass         http://flask_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;

        # Only allow POST
        limit_except POST {
            deny all;
        }
    }

    # ── API: health check ──────────────────────────
    location /health {
        proxy_pass         http://flask_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        access_log off;
    }

    # ── Redirect: short codes ──────────────────────
    # Matches alphanumeric short codes e.g. /aB3x9Z
    location ~ ^/([a-zA-Z0-9]{4,20})$ {
        proxy_pass         http://flask_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Block everything else ──────────────────────
    location ~ /\. {
        deny all;
    }

    # ── Custom error pages ─────────────────────────
    error_page 404 /index.html;
    error_page 502 503 504 @gateway_error;

    location @gateway_error {
        default_type application/json;
        return 502 '{"error": "Service temporarily unavailable. Please try again."}';
    }
}
